appId: com.anonymous.odin
name: "AUTH-002: Login Invalid Password"
tags:
  - auth
  - regression
  - P0
env:
  USERNAME: "test@example.com"
  PASSWORD: "WrongPassword1!"
---
- launchApp:
    clearState: true

- assertVisible: "Welcome back"

- tapOn:
    text: "Email"
- inputText: ${USERNAME}
- tapOn:
    text: "Password"
- inputText: ${PASSWORD}

- tapOn:
    text: "Sign in"

# Expect error notice
- assertVisible: "Sign in failed"
- takeScreenshot: auth/AUTH-002-login-invalid-password
