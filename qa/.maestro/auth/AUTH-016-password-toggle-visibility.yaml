appId: com.anonymous.odin
name: "AUTH-016: Password Toggle Visibility"
tags:
  - auth
  - regression
  - P1
env:
  TEST_PASSWORD: "MySecret123!"
---
- launchApp:
    clearState: true

- assertVisible: "Welcome back"

# Enter a password (masked by default)
- tapOn:
    text: "Password"
- inputText: ${TEST_PASSWORD}

# Toggle show password
- tapOn:
    id: "Show password"

# Toggle back to hide
- tapOn:
    id: "Hide password"

- takeScreenshot: auth/AUTH-016-password-toggle-visibility
