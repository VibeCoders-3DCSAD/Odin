appId: com.anonymous.odin
name: "SYNC-004: Sync on Reconnect"
tags:
  - offline
  - regression
  - P0
env:
  USERNAME: "test@example.com"
  PASSWORD: "Test1234!"
---
- launchApp:
    clearState: true

# Login while online
- runFlow:
    file: ../subflows/login.yaml

- extendedWaitUntil:
    visible: "Home"
    timeout: 15000

# Go offline
- setAirplaneMode: enabled

# Wait a moment for app to register offline state
- takeScreenshot: offline/SYNC-004-before-reconnect

# Restore connectivity — app should sync automatically
- setAirplaneMode: disabled

# Wait for sync to complete
- extendedWaitUntil:
    visible: "Dashboard"
    timeout: 15000

- takeScreenshot: offline/SYNC-004-after-reconnect
