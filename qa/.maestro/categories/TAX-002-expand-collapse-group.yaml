appId: com.anonymous.odin
name: "TAX-002: Expand Collapse Group"
tags:
  - categories
  - regression
  - P1
env:
  USERNAME: "test@example.com"
  PASSWORD: "Test1234!"
---
- launchApp:
    clearState: true

- runFlow:
    file: ../subflows/login.yaml

- extendedWaitUntil:
    visible: "Home"
    timeout: 15000

- runFlow:
    file: ../subflows/navigate-to-categories.yaml

# Essentials group should start collapsed — verify group label is rendered
- assertVisible: "Essentials"

# Tap Essentials group to expand
- tapOn:
    text: "Essentials"

# After expand, a child category should be visible
- extendedWaitUntil:
    visible: "Food"
    timeout: 5000

- takeScreenshot: categories/TAX-002-group-expanded

# Tap again to collapse
- tapOn:
    text: "Essentials"

# After collapse, child category should be hidden
- assertNotVisible: "Food"

- takeScreenshot: categories/TAX-002-group-collapsed
