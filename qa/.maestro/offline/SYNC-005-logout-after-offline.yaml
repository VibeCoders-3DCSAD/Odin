appId: com.anonymous.odin
name: "SYNC-005: Logout With Unsynced Data"
tags:
  - offline
  - regression
  - P1
env:
  USERNAME: "test@example.com"
  PASSWORD: "Test1234!"
  CATEGORY_LABEL: "Maestro Offline Sync Category"
  CATEGORY_DESCRIPTION: "Queued for sync"
---
- launchApp:
    clearState: true

# Login while online
- runFlow:
    file: ../subflows/login.yaml

- extendedWaitUntil:
    visible: "Home"
    timeout: 15000

# Go offline
- setAirplaneMode: enabled

# Create a category while offline — this queues a real sync operation
- runFlow:
    file: ../subflows/navigate-to-categories.yaml

- tapOn:
    id: "Create category"
- assertVisible: "New Category"
- tapOn:
    id: "Essentials"
- tapOn:
    placeholder: "e.g. My Category"
- inputText: ${CATEGORY_LABEL}
- tapOn:
    placeholder: "What this category covers"
- inputText: ${CATEGORY_DESCRIPTION}
- tapOn:
    text: "Save"

# Attempt logout while offline with unsynced data
- runFlow:
    file: ../subflows/logout.yaml

# Logout should be blocked — app must warn about unsynced changes
- extendedWaitUntil:
    visible: "unsynced"
    timeout: 15000

- assertVisible: "unsynced"
- takeScreenshot: offline/SYNC-005-logout-blocked

# Restore connectivity so the queued category can sync
- setAirplaneMode: disabled

# Now logout should succeed
- runFlow:
    file: ../subflows/logout.yaml

- extendedWaitUntil:
    visible: "Welcome back"
    timeout: 15000

- assertVisible: "Welcome back"
- takeScreenshot: offline/SYNC-005-logout-after-sync
