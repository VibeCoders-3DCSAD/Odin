appId: com.anonymous.odin
name: "AUTH-008: Register Weak Password"
tags:
  - auth
  - regression
  - P1
env:
  NEW_EMAIL: "weakpass@odin-test.com"
  WEAK_PASSWORD: "123"
---
- launchApp:
    clearState: true

- assertVisible: "Welcome back"

# Switch to register mode
- tapOn:
    text: "Create account"

# Fill email
- tapOn:
    text: "Email"
- inputText: ${NEW_EMAIL}

# Enter weak password
- tapOn:
    text: "Create password"
- inputText: ${WEAK_PASSWORD}

# Expect password rules shown (some failing)
- assertVisible: "8+ characters"
- takeScreenshot: auth/AUTH-008-register-weak-password

# Verify create account button is visually disabled (opacity 0.4)
- tapOn:
    text: "Create account"
# Nothing should happen — no network request, no navigation
- assertVisible: "Set up your Odin account"
