appId: com.anonymous.odin
name: "SET-001: Toggle Privacy Setting"
tags:
  - settings
  - regression
  - P0
env:
  USERNAME: "test@example.com"
  PASSWORD: "Test1234!"
---
- launchApp:
    clearState: true

# Login
- runFlow:
    file: ../subflows/login.yaml

# Wait for app shell
- extendedWaitUntil:
    visible: "Home"
    timeout: 15000

# Navigate to settings
- runFlow:
    file: ../subflows/navigate-to-settings.yaml

- assertVisible: "Settings"

# Find and toggle Personalization
- scrollUntilVisible:
    element:
      id: "Personalization"
    direction: DOWN

- tapOn:
    id: "Personalization"

- takeScreenshot: settings/SET-001-toggle-privacy-setting
