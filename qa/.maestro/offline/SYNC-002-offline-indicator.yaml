appId: com.anonymous.odin
name: "SYNC-002: Offline Blocks Settings Change"
tags:
  - offline
  - regression
  - P0
env:
  USERNAME: "test@example.com"
  PASSWORD: "Test1234!"
---
- launchApp:
    clearState: true

# Login while online
- runFlow:
    file: ../subflows/login.yaml

- extendedWaitUntil:
    visible: "Home"
    timeout: 15000

# Go offline
- setAirplaneMode: enabled

# Navigate to settings
- runFlow:
    file: ../subflows/navigate-to-settings.yaml

- assertVisible: "Settings"

# Try to toggle a privacy setting while offline — should show toast
- scrollUntilVisible:
    element:
      id: "Personalization"
    direction: DOWN

- tapOn:
    id: "Personalization"

# Expect offline toast
- assertVisible: "Can't save while offline"
- takeScreenshot: offline/SYNC-002-offline-indicator-shown

# Restore
- setAirplaneMode: disabled
