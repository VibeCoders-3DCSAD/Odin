appId: com.anonymous.odin
name: "NAV-005: Back Button Behavior"
tags:
  - navigation
  - regression
  - P0
env:
  USERNAME: "test@example.com"
  PASSWORD: "Test1234!"
---
- launchApp:
    clearState: true

# Login
- runFlow:
    file: ../subflows/login.yaml

- extendedWaitUntil:
    visible: "Home"
    timeout: 15000

# Navigate deep via drawer
- tapOn:
    id: "Open navigation menu"
- tapOn:
    id: "Settings"

- assertVisible: "Settings"

# Press Android back button
- back

# Should return to dashboard
- assertVisible: "Dashboard"
- takeScreenshot: navigation/NAV-005-back-button-behavior
