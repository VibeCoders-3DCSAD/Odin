appId: com.anonymous.odin
name: "AUTH-009: Password Reset Flow"
tags:
  - auth
  - regression
  - P0
env:
  RESET_EMAIL: "test@example.com"
---
- launchApp:
    clearState: true

- assertVisible: "Welcome back"

# Navigate to reset password
- tapOn:
    text: "Forgot password?"

- assertVisible: "Reset your password"

# Enter email
- tapOn:
    text: "Email"
- inputText: ${RESET_EMAIL}

# Send reset link
- tapOn:
    text: "Send reset link"

# Expect success message (generic, no user enumeration)
- assertVisible: "If that email exists"
- takeScreenshot: auth/AUTH-009-password-reset-flow
