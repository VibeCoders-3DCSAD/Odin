appId: com.anonymous.odin
name: "SYNC-001: App Usable Offline"
tags:
  - offline
  - smoke
  - P0
env:
  USERNAME: "test@example.com"
  PASSWORD: "Test1234!"
---
# ponytail: setAirplaneMode is Android-only, which is fine since Odin is Android-only
- launchApp:
    clearState: true

# Login first while online
- runFlow:
    file: ../subflows/login.yaml

- extendedWaitUntil:
    visible: "Home"
    timeout: 15000

# Go offline
- setAirplaneMode: enabled

# App should still be usable (cached data, no crash)
- assertVisible: "Dashboard"
- takeScreenshot: offline/SYNC-001-app-usable-offline

# Navigate while offline
- tapOn:
    id: "History"
- assertVisible: "History"

- tapOn:
    id: "Home"
- assertVisible: "Dashboard"

# Restore connectivity
- setAirplaneMode: disabled
