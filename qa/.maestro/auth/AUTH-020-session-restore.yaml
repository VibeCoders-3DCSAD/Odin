appId: com.anonymous.odin
name: "AUTH-020: Session Restore on Relaunch"
tags:
  - auth
  - regression
  - P1
env:
  USERNAME: "test@example.com"
  PASSWORD: "Test1234!"
---
- launchApp:
    clearState: true

# Login while online
- runFlow:
    file: ../subflows/login.yaml

- extendedWaitUntil:
    visible: "Home"
    timeout: 15000

# Kill the app (background it)
- pressKey: Home

# Relaunch without clearing state — session should persist
- launchApp:
    clearState: false

# Should land on authenticated shell, not login screen
- extendedWaitUntil:
    visible: "Home"
    timeout: 15000

- assertVisible: "Home"
- assertNotVisible: "Welcome back"
- takeScreenshot: auth/AUTH-020-session-restore
