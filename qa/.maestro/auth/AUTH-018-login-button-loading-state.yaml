appId: com.anonymous.odin
name: "AUTH-018: Login Button Loading State"
tags:
  - auth
  - regression
  - P1
env:
  USERNAME: "test@example.com"
  PASSWORD: "Test1234!"
---
- launchApp:
    clearState: true

- assertVisible: "Welcome back"

# Fill valid credentials
- tapOn:
    text: "Email"
- inputText: ${USERNAME}

- tapOn:
    text: "Password"
- inputText: ${PASSWORD}

# Tap sign in and verify loading notice appears
- tapOn:
    text: "Sign in"

# The app shows "Signing you in..." notice during the request
- assertVisible: "Signing you in..."
- takeScreenshot: auth/AUTH-018-login-button-loading-state
