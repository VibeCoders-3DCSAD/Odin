appId: com.anonymous.odin
name: "TAX-002: Expand Collapse Group"
tags:
  - categories
  - regression
  - P1
env:
  USERNAME: "test@example.com"
  PASSWORD: "Test1234!"
---
- launchApp:
    clearState: true

- runFlow:
    file: ../subflows/login.yaml

- extendedWaitUntil:
    visible: "Home"
    timeout: 15000

- runFlow:
    file: ../subflows/navigate-to-categories.yaml

# Essentials group should start collapsed
- assertVisible:
    text: "Essentials, "

# Tap Essentials group to expand
- tapOn:
    text: "Essentials"

# After expand, the label includes "expanded" — verify it changed
- extendedWaitUntil:
    visible: "expanded"
    timeout: 5000

- takeScreenshot: categories/TAX-002-group-expanded

# Tap again to collapse
- tapOn:
    text: "Essentials"

# After collapse, "expanded" should no longer be visible
- extendedWaitUntil:
    visible: "expanded"
    timeout: 3000
    optional: true
- assertNotVisible:
    text: "expanded"

- takeScreenshot: categories/TAX-002-group-collapsed
