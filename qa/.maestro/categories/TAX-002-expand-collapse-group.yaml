appId: com.anonymous.odin
name: "TAX-002: Expand Collapse Group"
tags:
  - categories
  - regression
  - P1
env:
  USERNAME: "test@example.com"
  PASSWORD: "Test1234!"
---
- launchApp:
    clearState: true

- runFlow:
    file: ../subflows/login.yaml

- extendedWaitUntil:
    visible: "Home"
    timeout: 15000

- runFlow:
    file: ../subflows/navigate-to-categories.yaml

# Group should start collapsed — accessibilityLabel ends with "collapsed"
- assertVisible:
    text: "collapsed"

# Tap Essentials group to expand
- tapOn:
    text: "Essentials"

# Group accessibilityLabel should now contain "expanded"
- assertVisible:
    text: "expanded"

- takeScreenshot: categories/TAX-002-group-expanded

# Tap again to collapse
- tapOn:
    text: "Essentials"

# Should be back to collapsed
- assertVisible:
    text: "collapsed"

- takeScreenshot: categories/TAX-002-group-collapsed
