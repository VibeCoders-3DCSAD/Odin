appId: com.anonymous.odin
name: "SET-005: Account Deletion Cancel"
tags:
  - settings
  - regression
  - P1
env:
  USERNAME: "test@example.com"
  PASSWORD: "Test1234!"
---
- launchApp:
    clearState: true

# Login
- runFlow:
    file: ../subflows/login.yaml

- extendedWaitUntil:
    visible: "Home"
    timeout: 15000

# Navigate to settings
- runFlow:
    file: ../subflows/navigate-to-settings.yaml

- assertVisible: "Settings"

# Scroll to Delete account
- scrollUntilVisible:
    element:
      id: "Delete account"
    direction: DOWN

- tapOn:
    id: "Delete account"

# Verify deletion screen — "Back to settings" is accessibilityLabel
- extendedWaitUntil:
    visible:
      id: "Back to settings"
    timeout: 5000

# Cancel - go back to settings
- tapOn:
    id: "Back to settings"

# Should be back on settings
- assertVisible: "Settings"
- takeScreenshot: settings/SET-005-account-deletion-cancel
